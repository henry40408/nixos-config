name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - uses: DeterminateSystems/flake-checker-action@3164002371bc90729c68af0e24d5aacf20d7c9f6 # v12

      - name: Check formatting
        run: |
          nix develop --command nixfmt --check .

      - name: Flake check
        run: nix flake check

  build-nixos:
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        config: [vm, wsl]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - name: Build ${{ matrix.config }}
        run: nix build .#nixosConfigurations.${{ matrix.config }}.config.system.build.toplevel

  build-home-manager:
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        config:
          - nixos@linux-x86_64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - name: Build ${{ matrix.config }}
        run: nix build .#homeConfigurations."${{ matrix.config }}".activationPackage
